name: Build and Push Docker Image

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Build and push image
        run: |
          IMAGE="ghcr.io/${{ github.repository_owner }}/pantheon-gateway"
          TAG="33.${{ github.run_number }}"

          docker build -q -t "${IMAGE}:${TAG}" .
          docker push "${IMAGE}:${TAG}"
          echo "new image ${IMAGE}:${TAG}"
