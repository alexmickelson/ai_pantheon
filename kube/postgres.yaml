---
apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  namespace: pantheon
type: Opaque
stringData:
  POSTGRES_USER: pantheon_user
  POSTGRES_PASSWORD: pantheon_pass
  POSTGRES_DB: pantheon_prod
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-config
  namespace: pantheon
data:
  POSTGRES_PORT: "5432"
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: pantheon
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:17-alpine
          ports:
            - containerPort: 5432
              name: postgres
          envFrom:
            - secretRef:
                name: postgres-secret
            - configMapRef:
                name: postgres-config
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: postgres-connection
                  key: url
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
            - name: schema
              mountPath: /docker-entrypoint-initdb.d
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "$(POSTGRES_USER)"]
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "$(POSTGRES_USER)"]
            initialDelaySeconds: 5
            periodSeconds: 5

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-schema
  namespace: pantheon
data:
  schema.sql: |
    # Mount your schema.sql content here or via a volumeClaim
    # For production, consider using a migration tool like ecto.migrate

---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: pantheon
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
      name: postgres
  clusterIP: None
